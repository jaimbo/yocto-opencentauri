[include mainsail.cfg]
[include macros.cfg]

[printer]
kinematics: corexy
max_velocity: 500.000000
max_accel: 20000.000000
max_z_velocity: 20.000000
max_z_accel: 500.000000
square_corner_velocity: 9.000000

[stepper_x]
step_pin: PE8
dir_pin: !PE7
enable_pin: !PE10
endstop_pin: tmc2209_stepper_x:virtual_endstop
microsteps: 16
full_steps_per_rotation: 200
position_endstop: -2.0
position_max: 256.5
position_min: -2.01
homing_speed: 80
homing_retract_dist: 20
rotation_distance: 39.872

[stepper_y]
step_pin: PE14
dir_pin: !PE13
enable_pin: !PE15
endstop_pin: tmc2209_stepper_y:virtual_endstop
microsteps: 16
full_steps_per_rotation: 200
position_endstop: -2.5
position_max: 270.000000
position_min: -2.51
homing_speed: 80
homing_retract_dist: 0
rotation_distance: 39.872

[stepper_z]
step_pin: PG3
dir_pin: !PG2
enable_pin: !PG1
endstop_pin: PG8
microsteps: 16
full_steps_per_rotation: 200
position_endstop: 4.5
position_max: 258.000000
position_min: -5
homing_speed: 8.000000
homing_retract_dist: 10
homing_retract_speed: 6
second_homing_speed: 3.000000
rotation_distance: 8

[thermistor hotend_termistor]
temperature1: 25
resistance1: 100000
beta: 4300

[extruder]
step_pin: hotend:PC13
dir_pin: hotend:PC14
enable_pin: !hotend:PC15
heater_pin: hotend:PB6
sensor_pin: hotend:PA3
microsteps: 16
full_steps_per_rotation: 200
gear_ratio: 52:10
rotation_distance: 28.8
nozzle_diameter: 0.400000
filament_diameter: 1.750000
sensor_type: hotend_termistor
control: pid
pid_Kp: 24.860427
pid_Ki: 2.702253
pid_Kd: 57.178292
min_temp: -200
max_temp: 335
min_extrude_temp: 170
pressure_advance: 0.04
pressure_advance_smooth_time: 0.01
max_extrude_only_velocity: 60
max_extrude_only_accel: 5000

[tmc2209 stepper_x]
tx_pin: PE9
uart_pin: PE6
uart_address: 0
interpolate: 1
run_current: 1.0
home_current: 0.8
sense_resistor: 0.1
driver_sgthrs: 120
stealthchop_threshold: 0
diag_pin: !PG4

[tmc2209 stepper_y]
tx_pin: PE9
uart_pin: PE6
interpolate: 1
run_current: 1.0
home_current: 0.8
uart_address: 3
sense_resistor: 0.1
driver_sgthrs: 120
stealthchop_threshold: 0
diag_pin: !PF6

[tmc2209 stepper_z]
tx_pin: PE9
uart_pin: PE6
interpolate: 1
run_current: 0.8
uart_address: 1
sense_resistor: 0.1
driver_sgthrs: 120
stealthchop_threshold: 99999

[tmc2209 extruder]
tx_pin: hotend:PC6
uart_pin: hotend:PC7
interpolate: 1
run_current: 0.8
hold_current: 0.5
uart_address: 3
sense_resistor: 0.1
driver_sgthrs: 10
stealthchop_threshold: 0

[led hotend]
red_pin: hotend:PC9

[led case]
white_pin: PG15
initial_WHITE: 1.0

[heater_bed]
heater_pin: PG13
sensor_pin: PB14
sensor_type: Generic 3950
control: pid
pid_Kp: 46.504839
pid_Ki: 1.453276
pid_Kd: 372.038710
min_temp: -200
max_temp: 125

[verify_heater extruder]
max_error: 120
check_gain_time: 20
hysteresis: 5
heating_gain: 2

[verify_heater heater_bed]
max_error: 120
check_gain_time: 120
hysteresis: 5
heating_gain: 2

[temperature_sensor box]
sensor_pin: PB13
sensor_type: Generic 3950
min_temp: -200
max_temp: 125

[fan]
pin: hotend:PB5
tachometer_pin: hotend:PA0

[heater_fan extruder]
pin: hotend:PC8
tachometer_pin: hotend:PA1

[fan_generic model_helper_fan]
pin: PG17

[fan_generic box_fan]
pin: PG18

[controller_fan mainboard]
pin: PG16
tachometer_pin: PG6
idle_speed: 0

[gcode_arcs]
resolution: 0.1

[pause_resume]

[mcu]
serial: /dev/ttyRPMSG0
restart_method: command

[mcu hotend]
serial: /dev/ttyACM0
restart_method: command

[mcu bed]
serial: /dev/ttyS4
baud: 115200
restart_method: command

[input_shaper]
shaper_type_x: mzv
shaper_freq_x: 55.2
shaper_type_y: mzv
shaper_freq_y: 47.0
damping_ratio_x: 0.06
damping_ratio_y: 0.082

[resonance_tester]
probe_points: 128,128,5
accel_chip: lis2dw
min_freq: 5.000000
max_freq: 75.000000
accel_per_hz: 100.000000
hz_per_sec: 1.000000

[lis2dw]
spi_speed: 5000000
cs_pin: hotend:PA4
spi_bus: spi1
axes_map: x,z,-y

[bed_mesh]
speed: 150.0
horizontal_move_z: 2.0
mesh_min: 20,20
mesh_max: 246,246
probe_count: 11,11
mesh_pps: 3,3
algorithm: bicubic
adaptive_margin: 5.0

[safe_z_home]
home_xy_position: 130, 130
speed: 300.0
z_hop: 0.0
z_hop_speed: 6.0

[hx711s]
samples: 2
samples_tolerance_retries: 2
speed: 2.0
sample_retract_dist: 1.0
lift_speed: 5.0
z_offset: 0.0
enable_test : 0
count : 4
sg_mode : 3
install_dir : 0
enable_hpf : 0
find_index_mode : 4
enable_shake_filter : 1
enable_channels : 16
rest_ticks : 3125
kalman_q : 10000
kalman_r : 100
max_th : 6000
min_th : 2000
th_k : 1
k_slope : 58
bias_slope : 42
sensor0_clk_pin : bed:PB13
sensor1_clk_pin : bed:PC7
sensor2_clk_pin : bed:PC6
sensor3_clk_pin : bed:PC9
sensor0_sdo_pin : bed:PB14
sensor1_sdo_pin : bed:PC8
sensor2_sdo_pin : bed:PB15
sensor3_sdo_pin : bed:PA8
